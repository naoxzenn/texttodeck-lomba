<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login | TextDeck AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link href="css/login.css" rel="stylesheet" />
</head>

<body class="bg-gradient-mesh min-h-screen flex flex-col font-body-md text-on-surface">
  <!-- Header -->
  <header class="fixed top-0 w-full z-50 bg-transparent py-md px-lg">
    <div class="max-w-container-max mx-auto flex items-center">
      <div class="flex items-center gap-xs cursor-pointer group">
        <span class="material-symbols-outlined text-primary-fixed text-[32px]"
          style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
        <span
          class="font-display-lg-mobile text-display-lg-mobile font-extrabold text-white tracking-tight">TextDeck</span>
      </div>
    </div>
  </header>
  <main class="flex-grow flex items-center justify-center px-sm py-xl mt-xl">
    <!-- Login Card -->
    <div
      class="glass-card w-full max-w-[480px] rounded-[32px] p-lg md:p-xl floating-glow transition-all duration-500 hover:translate-y-[-4px]">
      <div class="flex flex-col gap-lg">
        <!-- Header Section -->
        <div class="text-center md:text-left">
          <h1
            class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">
            Selamat Datang</h1>
          <p class="font-body-md text-body-md text-on-surface-variant mt-xs">Masuk ke akun TextDeck AI Anda untuk
            melanjutkan keajaiban visualisasi data.</p>
        </div>
        <!-- Form Section -->
        <form class="flex flex-col gap-md" id="loginForm">
          <!-- Email -->
          <div class="flex flex-col gap-xs">
            <label class="font-label-md text-label-md text-on-surface-variant px-xs" for="email">Email</label>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">mail</span>
              <input
                class="w-full bg-white/50 border border-outline-variant/30 rounded-xl py-sm pl-[52px] pr-md font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all placeholder:text-outline-variant"
                id="email" placeholder="nama@email.com" type="email" />
            </div>
          </div>
          <!-- Password -->
          <div class="flex flex-col gap-xs">
            <div class="flex justify-between items-center px-xs">
              <label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
              <a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Lupa
                Password</a>
            </div>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
              <input
                class="w-full bg-white/50 border border-outline-variant/30 rounded-xl py-sm pl-[52px] pr-md font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all placeholder:text-outline-variant"
                id="password" placeholder="••••••••" type="password" />
              <button
                class="absolute right-md top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors"
                type="button">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>
          <!-- Remember Me -->
          <div class="flex items-center gap-xs px-xs">
            <input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="remember"
              type="checkbox" />
            <label class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer" for="remember">Ingat saya
              untuk login berikutnya</label>
          </div>
          <!-- Submit Button -->
          <button
            class="bg-primary hover:bg-secondary text-on-primary font-label-md text-label-md py-sm rounded-xl shadow-lg hover:shadow-primary-container/20 active:scale-95 transition-all flex justify-center items-center gap-xs">
            Login
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
          </button>
        </form>
        <!-- Divider -->
        <div class="relative flex items-center py-base">
          <div class="flex-grow border-t border-outline-variant/20"></div>
          <span class="flex-shrink mx-md font-label-sm text-label-sm text-outline-variant">atau masuk dengan</span>
          <div class="flex-grow border-t border-outline-variant/20"></div>
        </div>
        <!-- Google Login -->
        <button
          class="w-full bg-transparent border-2 border-primary-container/30 hover:border-primary-container text-on-surface font-label-md text-label-md py-sm rounded-xl transition-all flex items-center justify-center gap-sm group">
          <img alt="Google Logo" class="w-5 h-5 group-hover:scale-110 transition-transform"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5L5L3m7hzKNz_VvSWOFyoq3ZG3_E_XE7zeglCVduRBh765rBIm_4EpzXamto8h-IhZTUMnnryrlIdlKAd6Be8UJAMPDH28mgPEjHzCROngvLqdlMeV7rGjqptcP_ItPqeP6JbBEf-y9tI2fqItepMswi9HrqxdneXOqfUTWDwnBRDT2r6WcrkxIRmdtNIF7EORchul-j7ePfMHV4UMrvLsPPxgowD2wdZLmndf3VovLAd5s_NTloHmQMpK42dk3GDIEt-rTp26ZU" />
          Login with Google
        </button>
        <!-- Register Link -->
        <div class="text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            Belum punya akun?
            <a class="text-primary font-bold hover:text-secondary transition-colors underline-offset-4 hover:underline"
              href="#">Daftar Akun</a>
          </p>
        </div>
      </div>
    </div>
  </main>
  <!-- Background Decorations -->
  <div class="fixed top-1/4 -left-xl w-[300px] h-[300px] bg-primary/20 rounded-full blur-[120px] -z-10 animate-pulse">
  </div>
  <div
    class="fixed bottom-1/4 -right-xl w-[400px] h-[400px] bg-tertiary-container/10 rounded-full blur-[100px] -z-10 animate-bounce"
    style="animation-duration: 8s;"></div>
  <!-- Footer -->
  <footer class="w-full py-md px-lg">
    <div class="max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-sm">
      <p class="font-label-sm text-label-sm text-white/60">© 2024 TextDeck AI. All rights reserved.</p>
      <div class="flex gap-md">
        <a class="font-label-sm text-label-sm text-white/60 hover:text-white transition-colors" href="#">Privacy
          Policy</a>
        <a class="font-label-sm text-label-sm text-white/60 hover:text-white transition-colors" href="#">Terms of
          Service</a>
      </div>
    </div>
  </footer>
  <script src="js/login.js"></script>
</body>

</html>
